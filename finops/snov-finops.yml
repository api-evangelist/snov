meters:
- name: subscription_credits
  description: Monthly credit allotment granted by the active subscription plan.
  unit: credits
  aggregation: sum
  dimensions:
  - account
  - plan
- name: finder_credits
  description: Credits consumed finding emails by name and domain (1 per email).
  unit: credits
  aggregation: sum
  dimensions:
  - account
  - api
- name: domain_search_credits
  description: Credits consumed by domain search and prospect/domain-email/generic-contact tasks.
  unit: credits
  aggregation: sum
  dimensions:
  - account
  - api
- name: verification_credits
  description: Credits consumed verifying emails (1 per email).
  unit: credits
  aggregation: sum
  dimensions:
  - account
  - api
- name: enrichment_credits
  description: Credits consumed enriching profiles by email or LinkedIn URL (1 per profile, no charge if no data).
  unit: credits
  aggregation: sum
  dimensions:
  - account
  - api
- name: unique_recipients
  description: Unique outreach recipients used against the plan's recipient pool.
  unit: recipients
  aggregation: sum
  dimensions:
  - account
  - campaign
principles:
- name: Visibility
  description: Poll GET /v1/get-balance (free) to track remaining credits and pace metered calls; watch unique-recipient consumption against the plan pool.
- name: Allocation
  description: Tag prospect lists and campaigns per team/workload so credit and recipient burn maps to internal cost centers.
- name: Optimization
  description: Use free endpoints (domain email count, sender list) for discovery; batch up to 10 emails per verification and 10 prospects per finder request; skip enrichment when no data is expected since it is not charged.
- name: Accountability
  description: Assign owners per campaign and review monthly credit and recipient usage against the subscription tier; upgrade or downgrade tiers based on actual burn.
