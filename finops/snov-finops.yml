description: >-
  FinOps view of Snov.io spend. Snov.io bills a monthly subscription that grants
  a credit allotment and, on paid plans, a pool of unique recipients. API usage
  is metered in credits: email finder (per email), domain search (per request),
  domain prospects (per request plus per prospect with email), email
  verification (per email), and profile/LinkedIn enrichment (per profile) each
  draw ~1 credit, while balance checks, domain email counts, and sender-account
  listing are free. Cost control is primarily about conserving credits and
  choosing the right subscription tier.
notes: >-
  Credit costs are drawn from the Snov.io API documentation and are subject to
  change; verify against the pricing page and API reference during
  reconciliation.
