  - Analytics
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://snov.io/email-drip-campaigns
  baseURL: https://api.snov.io/v1
  properties:
  - url: https://snov.io/knowledgebase/email-drip-campaigns/
